services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: invoice-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: GROQ_API_KEY
        sync: false        # ← You set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    plan: free

  # ── Frontend (Static Site) ───────────────────────────────
  - type: web
    name: invoice-ai-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    plan: free
